name: Check CROUS Housing

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

concurrency:
  group: crous-housing-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Pull latest state
        run: git pull --ff-only origin "${GITHUB_REF_NAME}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the housing check script
        env:
          BREVO_LOGIN: ${{ secrets.BREVO_LOGIN }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FRIEND_TO_EMAIL: ${{ secrets.FRIEND_TO_EMAIL }}
        run: python crous_notifier.py

      - name: Commit and push state files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          mkdir -p data
          git add --all -- data
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update CROUS state files"
            git push
          fi
