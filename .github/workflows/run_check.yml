name: Check CROUS Housing

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore generated history cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/**/availability_changes.csv
            data/**/unique_residences.csv
            data/**/run_log.csv
          key: crous-generated-history-${{ github.run_id }}
          restore-keys: |
            crous-generated-history-

      - name: Run the housing check script
        env:
          BREVO_LOGIN: ${{ secrets.BREVO_LOGIN }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FRIEND_TO_EMAIL: ${{ secrets.FRIEND_TO_EMAIL }}
        run: python crous_notifier.py

      - name: Upload generated history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crous-generated-history-${{ github.run_id }}
          path: |
            data/**/availability_changes.csv
            data/**/unique_residences.csv
            data/**/run_log.csv
          if-no-files-found: ignore
          retention-days: 30

      - name: Save generated history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/**/availability_changes.csv
            data/**/unique_residences.csv
            data/**/run_log.csv
          key: crous-generated-history-${{ github.run_id }}

      - name: Commit and push state files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          mkdir -p data
          git add -A -- data
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update CROUS state files"
            git push
          fi
